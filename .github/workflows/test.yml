name: tests
# The deploy gate. Cloudflare Workers Builds also runs `npm test` via the deploy
# script, but this runs on every PR so red code can never reach a mergeable state.
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test
