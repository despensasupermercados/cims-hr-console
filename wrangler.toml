name = "cims-hr-console"
main = "src/worker.js"
compatibility_date = "2025-05-01"

# Weekly Seafarer Movements email recipient. The hourly cron (below) sends ONCE on
# Monday 07:00 America/New_York to this address. Kept here (not the dashboard) so it
# survives every CI deploy. Override per-environment if ever needed.
[vars]
MOVEMENTS_TO = "onboardsupport@dg3.com"
# Sender for ALL CIMS email (magic links, statements, movements). A real monitored
# address — NOT no-reply — to reduce corporate spam-filtering. Lives here so it survives
# worker.js overwrites; the worker reads env.MAIL_FROM.
MAIL_FROM = "CIMS <cims@cims.work>"

# Central transport — all email goes through cims-mailer (service binding).
# This worker builds content only; cims-mailer owns the Resend key,
# retries/outbox, and mail_log. See cims-mailer/docs/EMAIL-CONVENTION.md
[[services]]
binding = "MAILER"
service = "cims-mailer"

# DEPRECATED: the RESEND_API_KEY secret is no longer read by this worker — email
# delivery moved to the MAILER binding above. Delete the secret after verifying
# mail flows end-to-end:  wrangler secret delete RESEND_API_KEY

# Built-in AI engine for auto-summarising crew-report emails (used when no ANTHROPIC_API_KEY
# secret is set). No key or setup required; degrades gracefully to manual if unavailable.
[ai]
binding = "AI"

# Hourly safety-net sweep of the crew-reports inbox (the email handler also processes on arrival).
[triggers]
crons = ["0 * * * *"]

# Production database (already live, holds the 97 crew).
[[d1_databases]]
binding = "DB"
database_name = "cims-hr-console"
database_id = "f0ac8b6a-deac-4214-8f42-e22b202d7d7d"
migrations_dir = "migrations"

# ---- Staging: a separate Worker + separate D1 copy. Nothing reaches prod data
# that has not run green here first. Create the staging DB once with:
#   wrangler d1 create cims-hr-console-staging
# then paste its id below.
[env.staging]
name = "cims-hr-console-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "cims-hr-console-staging"
database_id = "REPLACE_WITH_STAGING_DB_ID"
migrations_dir = "migrations"
